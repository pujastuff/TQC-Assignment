<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE QUOTIENT CODE - Professional Assessment</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent-pos: #27ae60;
            --accent-neg: #e74c3c;
            --bg: #f8fafc;
            --card: #ffffff;
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--primary); line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--card); padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        header { text-align: center; margin-bottom: 40px; border-bottom: 3px solid #eee; padding-bottom: 20px; }
        h1 { margin: 0; color: var(--primary); letter-spacing: -1px; }
        .intro { color: #64748b; font-size: 1.1em; }
        
        .dimension-group { margin-bottom: 50px; background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
        .dimension-header { background: #f1f5f9; padding: 15px 25px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #475569; border-bottom: 1px solid #e2e8f0; }
        
        .question-item { padding: 20px 25px; border-bottom: 1px solid #f1f5f9; transition: background 0.2s; }
        .question-item:hover { background: #fbfcfe; }
        .question-text { font-weight: 500; margin-bottom: 12px; display: flex; align-items: flex-start; }
        .q-number { background: #e2e8f0; color: #475569; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; margin-right: 12px; margin-top: 3px; }
        
        .options { display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
        .option-label { font-size: 0.9em; color: #94a3b8; font-weight: bold; }
        .radio-group { display: flex; align-items: center; gap: 10px; }
        input[type="radio"] { cursor: pointer; transform: scale(1.2); }

        button#calculate { display: block; width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.2em; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 30px; box-shadow: 0 4px 14px rgba(0,0,0,0.2); }
        button#calculate:hover { background: #1e293b; transform: translateY(-2px); }

        #results { display: none; margin-top: 50px; border-top: 4px solid var(--primary); padding-top: 30px; }
        .report-section { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px; }
        .report-card { padding: 25px; border-radius: 12px; }
        .pos-card { background: #f0fdf4; border-left: 6px solid var(--accent-pos); }
        .neg-card { background: #fef2f2; border-left: 6px solid var(--accent-neg); }
        .report-card h3 { margin-top: 0; display: flex; align-items: center; justify-content: space-between; }
        
        .insight-list { list-style: none; padding: 0; margin: 15px 0 0 0; }
        .insight-list li { margin-bottom: 15px; padding-left: 20px; position: relative; font-size: 0.95em; }
        .insight-list li::before { content: "•"; position: absolute; left: 0; color: currentColor; font-weight: bold; }
        .quotient-title { font-weight: 800; text-decoration: underline; display: block; margin-bottom: 5px; }

        .chart-container { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>THE QUOTIENT CODE</h1>
        <p class="intro">Behavioral Performance Assessment & Shadow Analysis</p>
    </header>
    
    <div id="assessment-form"></div>
    
    <button id="calculate">Finalize & Generate Report</button>

    <div id="results">
        <h2 style="text-align: center; margin-bottom: 30px;">Executive Performance Insights</h2>
        
        <div class="report-section">
            <div class="report-card pos-card">
                <h3>Top 3 Positive Assets (+Q)</h3>
                <div id="top-positive-details"></div>
            </div>
            <div class="report-card neg-card">
                <h3>Top 3 Shadow Risks (-Q)</h3>
                <div id="top-negative-details"></div>
            </div>
        </div>

        <div class="chart-container">
            <h4 style="text-align:center">Dimensional Radar Analysis</h4>
            <canvas id="radarChart"></canvas>
        </div>
    </div>
</div>

<script>
// Data with custom insights for each quotient
const appData = [
    {"quotient": "+AQ Appreciation", "type": "Positive", "dimension": "People", "questions": ["I acknowledge contributions in real time rather than waiting for formal reviews", "I make appreciation specific and meaningful", "I use multiple ways (verbal, written, public) to appreciate others"], "points": ["Boosts team morale by validating individual effort.", "Creates a positive feedback loop that encourages excellence.", "Strengthens professional bonds through consistent recognition."]},
    {"quotient": "+BQ Benevolence", "type": "Positive", "dimension": "People", "questions": ["I help colleagues without expecting anything in return", "I step in to support others proactively", "I contribute to a positive environment through small acts of kindness"], "points": ["Fosters a culture of psychological safety and support.", "Encourages reciprocal cooperation across departments.", "Builds high levels of interpersonal trust and social capital."]},
    {"quotient": "+CQ Culture", "type": "Positive", "dimension": "People", "questions": ["I reinforce organizational values through daily behavior", "I speak up when actions contradict culture", "I contribute to psychological safety in teams"], "points": ["Acts as a primary guardian of the organization's core values.", "Ensures behavioral alignment with long-term company goals.", "Promotes inclusivity and shared purpose within teams."]},
    {"quotient": "+DQ Diligence", "type": "Positive", "dimension": "Organization", "questions": ["I prepare thoroughly before executing important tasks", "I pay attention to detail to ensure high-quality output", "I follow through on commitments consistently"], "points": ["Ensures high standards of accuracy and operational excellence.", "Reduces the risk of costly errors and rework.", "Builds a reputation for reliability and steady execution."]},
    {"quotient": "+EQ Empathy", "type": "Positive", "dimension": "People", "questions": ["I actively listen to others without interrupting", "I consider how my decisions affect others' emotions", "I validate others' feelings even when I disagree with them"], "points": ["Facilitates deeper understanding and conflict resolution.", "Enables compassionate leadership and employee engagement.", "Helps navigate complex human dynamics with sensitivity."]},
    {"quotient": "+FQ Finance", "type": "Positive", "dimension": "Business", "questions": ["I demonstrate a clear understanding of financial implications in decisions", "I manage budgets or resources responsibly", "I look for ways to optimize costs and improve efficiency"], "points": ["Ensures fiscal responsibility and resource optimization.", "Aligns tactical actions with the bottom-line performance.", "Drives efficient growth through smart capital management."]},
    {"quotient": "+GQ Gratitude", "type": "Positive", "dimension": "Mindset", "questions": ["I regularly express thankfulness to my team and peers", "I focus on what is working well rather than just identifying gaps", "I acknowledge the role of luck or support in my successes"], "points": ["Maintains a resilient and positive outlook within the team.", "Reduces workplace stress by focusing on successes.", "Promotes a humble and grounded leadership style."]},
    {"quotient": "+HQ Humaneness", "type": "Positive", "dimension": "Values", "questions": ["I treat everyone with dignity regardless of their position", "I prioritize people's well-being during difficult times", "I show kindness when others make mistakes"], "points": ["Upholds the fundamental dignity of every team member.", "Builds a legacy of kind and ethical leadership.", "Reduces turnover by prioritizing human well-being."]},
    {"quotient": "+IQ Inspiration", "type": "Positive", "dimension": "Leadership", "questions": ["I share a compelling vision that motivates others", "I lead by example in challenging situations", "I empower others to believe in their own potential"], "points": ["Ignites passion and discretionary effort in others.", "Translates abstract strategy into motivating action.", "Develops the next generation of leaders through empowerment."]},
    {"quotient": "+JQ Joy", "type": "Positive", "dimension": "Energy", "questions": ["I bring a positive energy to the workplace", "I find meaning and satisfaction in my daily tasks", "I encourage a light-hearted yet productive atmosphere"], "points": ["Infects the workspace with high energy and optimism.", "Helps the team cope with pressure through a positive vibe.", "Increases engagement by making work more enjoyable."]},
    {"quotient": "+KQ Knowledge", "type": "Positive", "dimension": "Capability", "questions": ["I actively seek opportunities to learn new skills", "I share my expertise to help others grow", "I stay updated on industry trends and developments"], "points": ["Ensures the team stays competitive and innovative.", "Promotes a culture of continuous learning and growth.", "Acts as a subject-matter resource for the organization."]},
    {"quotient": "+LQ Love", "type": "Positive", "dimension": "Values", "questions": ["I build deep and meaningful connections with colleagues", "I genuinely care about the growth and success of others", "I foster an environment of care and mutual support"], "points": ["Creates lasting, high-trust professional relationships.", "Promotes deep commitment to the collective mission.", "Supports colleagues during personal and professional lows."]},
    {"quotient": "+MQ Motivation", "type": "Positive", "dimension": "Energy", "questions": ["I maintain a high level of drive even during setbacks", "I take initiative without needing constant direction", "I inspire others to push through difficult challenges"], "points": ["Drives results even in the face of significant adversity.", "Acts as a self-starter who requires minimal oversight.", "Maintains momentum during long-term projects."]},
    {"quotient": "+NQ Neatness", "type": "Positive", "dimension": "Organization", "questions": ["I keep my workspace and digital files organized", "I present information in a clear and structured manner", "I value order and system in my execution"], "points": ["Enhances clarity and reduces time wasted on searching.", "Promotes a professional and structured workflow.", "Ensures that information is easily accessible to others."]},
    {"quotient": "+OQ Optimism", "type": "Positive", "dimension": "Mindset", "questions": ["I focus on possibilities rather than just problems", "I maintain a positive outlook during uncertain times", "I help others see the silver lining in failures"], "points": ["Fuels innovation by focusing on what's possible.", "Buffers the team against the drain of negative events.", "Encourages a 'can-do' attitude in the face of change."]},
    {"quotient": "+PQ Perseverance", "type": "Positive", "dimension": "Execution", "questions": ["I stay committed to long-term goals despite obstacles", "I finish what I start regardless of difficulties", "I show resilience when faced with repeated failures"], "points": ["Demonstrates the grit necessary for large-scale success.", "Ensures project completion despite evolving challenges.", "Sets a standard for resilience under high pressure."]},
    {"quotient": "+QQ Quintessence", "type": "Positive", "dimension": "Identity", "questions": ["I align my work with my core purpose and values", "I represent the best version of myself in professional settings", "I bring a unique and valuable essence to the team"], "points": ["Authentic alignment leads to high personal satisfaction.", "Brings a unique and irreplaceable value to the team.", "Inspires others through an authentic and purposeful presence."]},
    {"quotient": "+RQ Respect", "type": "Positive", "dimension": "Values", "questions": ["I value diverse perspectives even when they differ from mine", "I maintain professional courtesy under pressure", "I acknowledge the boundaries and autonomy of others"], "points": ["Creates an environment where all voices are heard.", "Minimizes toxic friction and professional hostility.", "Promotes collaborative problem-solving across hierarchies."]},
    {"quotient": "+SQ Social", "type": "Positive", "dimension": "Collaboration", "questions": ["I build strong professional networks internally and externally", "I navigate group dynamics effectively to achieve goals", "I contribute to a sense of community within the team"], "points": ["Acts as a bridge-builder between disparate teams.", "Masters the 'soft skills' needed for political navigation.", "Creates a sense of belonging and community at work."]},
    {"quotient": "+TQ Trustworthiness", "type": "Positive", "dimension": "Values", "questions": ["I follow through on promises and commitments", "I am transparent and honest in my communication", "I maintain confidentiality when required"], "points": ["The bedrock of all effective professional relationships.", "Reduces the need for micromanagement and monitoring.", "Ensures high integrity in data and communication."]},
    {"quotient": "+UQ Uniqueness", "type": "Positive", "dimension": "Identity", "questions": ["I leverage my unique strengths to add value", "I encourage others to express their distinct perspectives", "I embrace originality in problem-solving"], "points": ["Drives competitive advantage through original thinking.", "Prevents groupthink by offering 'outside-the-box' ideas.", "Encourages a diverse and innovative team culture."]},
    {"quotient": "+VQ Vitality", "type": "Positive", "dimension": "Health", "questions": ["I bring high energy and enthusiasm to my work", "I maintain a healthy balance between work and rest", "I inspire others with my drive and vigor"], "points": ["Maintains the stamina required for high-intensity roles.", "Infects the team with a proactive and energetic drive.", "Focuses on sustainable high performance over time."]},
    {"quotient": "+WQ Wellbeing", "type": "Positive", "dimension": "Balance", "questions": ["I prioritize my mental and physical health", "I set boundaries to prevent burnout", "I encourage a culture of wellness in the team"], "points": ["Prevents long-term burnout and associated costs.", "Sets a healthy precedent for the entire organization.", "Maintains a high level of mental clarity and focus."]},
    {"quotient": "+XQ X-Factor", "type": "Positive", "dimension": "Strategy", "questions": ["I offer innovative solutions that differentiate the business", "I possess a distinct quality that elevates performance", "I identify opportunities that others might miss"], "points": ["Identifies rare opportunities for growth and edge.", "Provides a unique competitive advantage to the team.", "Solves problems that others find insurmountable."]},
    {"quotient": "+YQ YinYang", "type": "Positive", "dimension": "Balance", "questions": ["I balance logic with intuition in decision-making", "I manage competing priorities with composure", "I adapt my approach between stability and change"], "points": ["Navigates paradoxes and competing priorities with ease.", "Brings a holistic view to complex decision-making.", "Balances the need for stability with the need for change."]},
    {"quotient": "+ZQ Zen", "type": "Positive", "dimension": "Mindset", "questions": ["I remain calm and centered during high-stress situations", "I practice mindfulness to stay focused on the present", "I respond thoughtfully rather than reacting impulsively"], "points": ["Acts as a stabilizing force during chaotic periods.", "Ensures logical decision-making when emotions are high.", "Promotes a mindful and focused approach to work."]},

    // Negative Quotients
    {"quotient": "-AQ Arrogance", "type": "Negative", "dimension": "Values", "questions": ["I dismiss others' opinions if they differ from mine", "I believe I am always more competent than my peers", "I take credit for others' work or ideas"], "points": ["Stifles team collaboration by devaluing others.", "Creates a blind spot regarding personal limitations.", "Damages trust through a lack of professional humility."]},
    {"quotient": "-BQ Bureaucracy", "type": "Negative", "dimension": "Organization", "questions": ["I prioritize rules and procedures over practical results", "I make processes unnecessarily complex for others", "I resist changes that simplify existing systems"], "points": ["Slows down organizational agility and innovation.", "Creates friction through unnecessary red tape.", "Prioritizes compliance over actual performance impact."]},
    {"quotient": "-CQ Chauvinism", "type": "Negative", "dimension": "Values", "questions": ["I show favoritism toward people like me", "I dismiss perspectives from different departments or cultures", "I believe my way is the only right way"], "points": ["Undermines diversity and inclusive growth efforts.", "Limits the team's ability to benefit from varied views.", "Creates silos and 'us vs them' mentalities."]},
    {"quotient": "-DQ Distrust", "type": "Negative", "dimension": "Values", "questions": ["I question others' motives without evidence", "I withhold information to maintain control", "I struggle to rely on others to finish tasks"], "points": ["Destroys the speed of execution by over-verifying.", "Encourages a secretive and guarded culture.", "Drains team energy through constant skepticism."]},
    {"quotient": "-EQ Ego", "type": "Negative", "dimension": "Identity", "questions": ["I focus more on my status than on team success", "I react defensively when my ideas are challenged", "I seek constant validation for my contributions"], "points": ["Prioritizes individual perception over collective goals.", "Makes the individual difficult to coach or give feedback.", "Drains resources through the need for constant validation."]},
    {"quotient": "-FQ Frivolity", "type": "Negative", "dimension": "Discipline", "questions": ["I treat serious work matters with a lack of focus", "I spend too much time on non-essential activities", "I struggle to maintain focus during critical tasks"], "points": ["Leads to a lack of professional gravitas in serious moments.", "Wastes team time on non-impactful distractions.", "May signal a lack of commitment to critical missions."]},
    {"quotient": "-GQ Greediness", "type": "Negative", "dimension": "Values", "questions": ["I prioritize personal gain over team outcomes", "I hoard resources or opportunities for myself", "I am never satisfied regardless of the achievements"], "points": ["Erodes team cohesion by hoarding resources.", "Creates a zero-sum mentality that blocks cooperation.", "Triggers ethical risks in pursuit of personal gain."]},
    {"quotient": "-HQ Hypocrisy", "type": "Negative", "dimension": "Values", "questions": ["I set standards for others that I do not follow", "I say one thing but do another when under pressure", "I hide my true intentions behind professional jargon"], "points": ["Severely damages leadership credibility and trust.", "Creates confusion regarding the 'real' rules of the team.", "Encourages a culture of dishonesty and gamesmanship."]},
    {"quotient": "-IQ Impersonality", "type": "Negative", "dimension": "People", "questions": ["I treat colleagues as mere tools for execution", "I avoid building personal connections at work", "I show little concern for others' personal lives or challenges"], "points": ["Prevents the formation of deep professional loyalties.", "Makes the individual appear cold and unapproachable.", "Reduces team engagement through a lack of human connection."]},
    {"quotient": "-JQ Jealousy", "type": "Negative", "dimension": "Mindset", "questions": ["I feel resentful when others receive recognition", "I compare my success with others' constantly", "I find it hard to celebrate peers' achievements"], "points": ["Creates toxic internal competition rather than cooperation.", "Demotivates high-performing peers through resentment.", "Keeps the individual focused on others rather than self-growth."]},
    {"quotient": "-KQ Kafkaesque", "type": "Negative", "dimension": "Organization", "questions": ["I create circular or confusing processes", "I avoid giving straight answers to simple questions", "I make others feel lost in a maze of procedures"], "points": ["Causes immense frustration through lack of clarity.", "Creates a 'culture of confusion' that halts progress.", "Wastes hours of productivity in circular logic."]},
    {"quotient": "-LQ Laxity", "type": "Negative", "dimension": "Execution", "questions": ["I allow standards to drop for the sake of speed", "I ignore errors that don't immediately cause issues", "I am inconsistent in following through on details"], "points": ["Indicates a risk of declining quality and precision.", "Signals to the team that low standards are acceptable.", "May lead to catastrophic failures through overlooked details."]},
    {"quotient": "-MQ Machiavellianism", "type": "Negative", "dimension": "Strategy", "questions": ["I use manipulation to achieve my goals", "I view relationships purely as transactional", "I believe the end justifies any means used"], "points": ["Destroys long-term trust for short-term political gains.", "Creates a paranoid and manipulative work environment.", "Poses significant reputational risks to the organization."]},
    {"quotient": "-NQ Narcissism", "type": "Negative", "dimension": "Identity", "questions": ["I expect special treatment due to my role", "I dominate conversations to focus on my achievements", "I lack empathy for others' struggles if they don't affect me"], "points": ["Makes the team feel invisible and unappreciated.", "Centers all strategy around personal glory.", "Drives away talented individuals who want shared growth."]},
    {"quotient": "-OQ Obtuse", "type": "Negative", "dimension": "Strategy", "questions": ["I fail to see obvious risks or opportunities", "I ignore feedback that suggests I am wrong", "I struggle to grasp complex or subtle dynamics"], "points": ["Leads to major strategic errors through a lack of insight.", "Causes frustration as others have to 'explain the obvious'.", "Increases risk exposure by missing subtle warning signs."]},
    {"quotient": "-PQ Pessimism", "type": "Negative", "dimension": "Mindset", "questions": ["I focus primarily on why things will fail", "I discourage others from trying new things", "I am the first to complain about changes"], "points": ["Acts as a significant drain on team innovation and hope.", "Kills new ideas before they have a chance to grow.", "Creates a culture of 'stuckness' and complaints."]},
    {"quotient": "-QQ Quixotic", "type": "Negative", "dimension": "Strategy", "questions": ["I pursue unrealistic goals that lack practical foundation", "I ignore data in favor of personal ideals", "I lead others into projects with low chances of success"], "points": ["Wastes resources on impossible or ungrounded dreams.", "Leads to frequent team disappointment and burnout.", "Demonstrates a lack of realistic, data-driven judgment."]},
    {"quotient": "-RQ Retribution", "type": "Negative", "dimension": "Leadership", "questions": ["I hold grudges against colleagues who disagree with me", "I look for ways to 'get even' after a conflict", "I use my authority to penalize those who challenge me"], "points": ["Silences healthy debate through fear of retaliation.", "Builds a culture of grudges and long-term toxicity.", "Drives high turnover among high-potential employees."]},
    {"quotient": "-SQ Shortsightedness", "type": "Negative", "dimension": "Strategy", "questions": ["I prioritize immediate results over long-term health", "I ignore the future implications of today's decisions", "I fail to plan for predictable risks"], "points": ["Sacrifices the organization's future for today's wins.", "Leads to reactive management rather than proactive strategy.", "Leaves the team unprepared for inevitable changes."]},
    {"quotient": "-TQ Toxicity", "type": "Negative", "dimension": "People", "questions": ["I contribute to workplace gossip or negativity", "I undermine team morale with critical comments", "I make others feel drained after interacting with me"], "points": ["Rapidly spreads negativity across the entire team.", "Damages individual mental health and performance.", "Creates a workplace that people actively want to leave."]},
    {"quotient": "-UQ Utopian", "type": "Negative", "dimension": "Strategy", "questions": ["I expect perfection that is unattainable", "I criticize realistic solutions for not being ideal", "I get frustrated when others don't share my perfect vision"], "points": ["Blocks 'good' solutions by demanding 'perfect' ones.", "Creates constant frustration and a sense of failure.", "Detaches strategy from the reality of human execution."]},
    {"quotient": "-VQ Vitriol", "type": "Negative", "dimension": "People", "questions": ["I react aggressively to disagreements", "I communicate in a confrontational manner", "I create discomfort through tone"], "points": ["Shuts down communication through verbal aggression.", "Damages professional reputation and human relations.", "Increases the stress level of the entire department."]},
    {"quotient": "-WQ Whatever", "type": "Negative", "dimension": "Mindset", "questions": ["I show indifference toward outcomes", "I lack ownership in tasks", "I disengage easily from responsibilities"], "points": ["Signals a lack of skin-in-the-game or commitment.", "Increases the burden on others who must cover the slack.", "Stops personal and organizational growth through apathy."]},
    {"quotient": "-XQ Xenophobia", "type": "Negative", "dimension": "Values", "questions": ["I am uncomfortable with unfamiliar cultures or ideas", "I resist diversity in teams", "I prefer working with similar people"], "points": ["Creates a hostile environment for diverse talent.", "Cuts off the organization from global perspectives.", "Violates modern ethical and professional standards."]},
    {"quotient": "-YQ Yellow", "type": "Negative", "dimension": "Courage", "questions": ["I avoid taking risks due to fear", "I hesitate to make decisions", "I back out under pressure"], "points": ["Leads to paralysis and missed opportunities.", "Weakens leadership during critical moments of crisis.", "Causes the individual to abandon commitments under heat."]},
    {"quotient": "-ZQ Zombie", "type": "Negative", "dimension": "Energy", "questions": ["I operate without enthusiasm or energy", "I go through tasks mechanically", "I lack initiative"], "points": ["Drains the energy of the team through visible apathy.", "Limits performance to the bare minimum required.", "Makes the individual easily replaceable and unmemorable."]}
];

const form = document.getElementById('assessment-form');

const groupedData = {};
appData.forEach(item => {
    if (!groupedData[item.dimension]) groupedData[item.dimension] = [];
    groupedData[item.dimension].push(item);
});

let qGlobalIndex = 1;

for (const dimension in groupedData) {
    const dimDiv = document.createElement('div');
    dimDiv.className = 'dimension-group';
    dimDiv.innerHTML = `<div class="dimension-header">${dimension} Dimension</div>`;
    
    groupedData[dimension].forEach(qObj => {
        qObj.questions.forEach((text, i) => {
            const qItem = document.createElement('div');
            qItem.className = 'question-item';
            const qId = `${qObj.quotient}_${i}`;
            qItem.innerHTML = `
                <div class="question-text"><span class="q-number">${qGlobalIndex}</span> ${text}</div>
                <div class="options">
                    <span class="option-label">RARELY</span>
                    <div class="radio-group">
                        ${[1,2,3,4,5].map(v => `<input type="radio" name="${qId}" value="${v}" required>`).join('')}
                    </div>
                    <span class="option-label">ALWAYS</span>
                </div>
            `;
            dimDiv.appendChild(qItem);
            qGlobalIndex++;
        });
    });
    form.appendChild(dimDiv);
}

document.getElementById('calculate').onclick = () => {
    const results = {};
    const dimensionScores = {};
    
    appData.forEach(qObj => {
        let total = 0;
        let count = 0;
        qObj.questions.forEach((text, i) => {
            const val = document.querySelector(`input[name="${qObj.quotient}_${i}"]:checked`)?.value;
            if (val) {
                total += parseInt(val);
                count++;
            }
        });
        const avg = count > 0 ? total / count : 0;
        results[qObj.quotient] = { score: avg, type: qObj.type, dimension: qObj.dimension, points: qObj.points };
        
        if (!dimensionScores[qObj.dimension]) dimensionScores[qObj.dimension] = { pos: 0, neg: 0, pCount: 0, nCount: 0 };
        if (qObj.type === 'Positive') {
            dimensionScores[qObj.dimension].pos += avg;
            dimensionScores[qObj.dimension].pCount++;
        } else {
            dimensionScores[qObj.dimension].neg += avg;
            dimensionScores[qObj.dimension].nCount++;
        }
    });

    const posSorted = Object.entries(results).filter(([k,v]) => v.type === 'Positive').sort((a,b) => b[1].score - a[1].score);
    const negSorted = Object.entries(results).filter(([k,v]) => v.type === 'Negative').sort((a,b) => b[1].score - a[1].score);

    // Render Top 3 Positive with Points
    document.getElementById('top-positive-details').innerHTML = posSorted.slice(0,3).map(x => `
        <div style="margin-bottom:20px">
            <span class="quotient-title">${x[0]} (Score: ${x[1].score.toFixed(1)})</span>
            <ul class="insight-list" style="color: #166534">
                ${x[1].points.map(p => `<li>${p}</li>`).join('')}
            </ul>
        </div>
    `).join('');

    // Render Top 3 Negative with Points
    document.getElementById('top-negative-details').innerHTML = negSorted.slice(0,3).map(x => `
        <div style="margin-bottom:20px">
            <span class="quotient-title">${x[0]} (Score: ${x[1].score.toFixed(1)})</span>
            <ul class="insight-list" style="color: #991b1b">
                ${x[1].points.map(p => `<li>${p}</li>`).join('')}
            </ul>
        </div>
    `).join('');

    const labels = Object.keys(dimensionScores);
    const posData = labels.map(l => dimensionScores[l].pos / (dimensionScores[l].pCount || 1));
    const negData = labels.map(l => dimensionScores[l].neg / (dimensionScores[l].nCount || 1));

    new Chart(document.getElementById('radarChart'), {
        type: 'radar',
        data: {
            labels: labels,
            datasets: [
                { label: 'Positive Profile', data: posData, borderColor: '#27ae60', backgroundColor: 'rgba(39, 174, 96, 0.2)', borderWidth: 3, pointBackgroundColor: '#27ae60' },
                { label: 'Negative Shadow', data: negData, borderColor: '#e74c3c', backgroundColor: 'rgba(231, 76, 60, 0.2)', borderWidth: 3, pointBackgroundColor: '#e74c3c' }
            ]
        },
        options: {
            scales: { r: { min: 0, max: 5, ticks: { display: false } } },
            plugins: { legend: { position: 'bottom' } }
        }
    });

    document.getElementById('results').style.display = 'block';
    window.scrollTo({ top: document.getElementById('results').offsetTop - 50, behavior: 'smooth' });
};
</script>
